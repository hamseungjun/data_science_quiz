<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Web</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="card" id="screen">
      <div class="screen active" id="intro-screen">
        <p class="eyebrow">Portable Quiz</p>
        <h1>데이터 사이언스 퀴즈</h1>
        <p class="lead">
          한 문제씩 풀고 마지막에 accuracy만 확인하는 아주 단순한 퀴즈 앱입니다.
        </p>
        <div class="meta-grid">
          <div class="meta-box">
            <span class="meta-label">문항 수</span>
            <strong id="total-count">-</strong>
          </div>
          <div class="meta-box">
            <span class="meta-label">진행 저장</span>
            <strong id="resume-state">불러오는 중</strong>
          </div>
        </div>
        <button class="primary-btn" id="start-btn" type="button">시작하기</button>
      </div>

      <div class="screen" id="quiz-screen">
        <header class="quiz-header">
          <div>
            <p class="eyebrow">Question</p>
            <p class="progress-text" id="progress-text">1 / 40</p>
          </div>
          <button class="ghost-btn" id="reset-btn" type="button">처음부터</button>
        </header>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <article class="question-block">
          <h2 id="question-text"></h2>
          <div class="options" id="options-container"></div>
        </article>

        <div class="actions">
          <button class="primary-btn" id="next-btn" type="button" disabled>다음</button>
        </div>
      </div>

      <div class="screen" id="result-screen">
        <p class="eyebrow">Finished</p>
        <h2>최종 Accuracy</h2>
        <p class="accuracy-value" id="accuracy-value">0%</p>
        <button class="primary-btn" id="restart-btn" type="button">다시 풀기</button>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
